<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Middleburg</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c5530">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🏠 Casa Middleburg</h1>
        <nav>
            <button class="nav-btn active" data-section="tareas">Tareas</button>
            <button class="nav-btn" data-section="calendario">Calendario</button>
            <button class="nav-btn" data-section="historial">Historial</button>
            <button class="nav-btn" data-section="proveedores">Proveedores</button>
        </nav>
    </header>

    <main>
        <section id="tareas" class="section active">
            <div class="section-header">
                <h2>Tareas de Mantenimiento</h2>
                <button id="btn-nueva-tarea" class="btn-primary">+ Nueva Tarea</button>
            </div>
            <div class="filtros">
                <button class="filtro active" data-filtro="todas">Todas</button>
                <button class="filtro" data-filtro="pendientes">Pendientes</button>
                <button class="filtro" data-filtro="vencidas">Vencidas</button>
            </div>
            <div id="lista-tareas"></div>
        </section>

        <section id="calendario" class="section">
            <h2>Calendario</h2>
            <div id="calendario-container">
                <div class="calendario-header">
                    <button id="mes-anterior" class="btn-nav">←</button>
                    <h3 id="mes-actual"></h3>
                    <button id="mes-siguiente" class="btn-nav">→</button>
                </div>
                <div id="calendario-grid"></div>
            </div>
            <div id="tareas-dia">
                <h4>Tareas del día seleccionado</h4>
                <div id="lista-tareas-dia"></div>
            </div>
        </section>

        <section id="historial" class="section">
            <div class="section-header">
                <h2>Historial de Mantenimiento</h2>
                <div class="historial-stats" id="stats-costos"></div>
            </div>
            <div id="lista-historial"></div>
        </section>

        <section id="proveedores" class="section">
            <div class="section-header">
                <h2>Proveedores</h2>
                <button id="btn-nuevo-proveedor" class="btn-primary">+ Nuevo Proveedor</button>
            </div>
            <div id="lista-proveedores"></div>
        </section>
    </main>

    <div id="modal-tarea" class="modal">
        <div class="modal-content">
            <span class="cerrar">&times;</span>
            <h3 id="modal-tarea-titulo">Nueva Tarea</h3>
            <form id="form-tarea">
                <input type="hidden" id="tarea-id">
                <label for="tarea-nombre">Nombre de la tarea</label>
                <input type="text" id="tarea-nombre" required>
                <label for="tarea-sistema">Sistema</label>
                <select id="tarea-sistema" required>
                    <option value="">Seleccionar...</option>
                    <option value="HVAC">HVAC</option>
                    <option value="Pozo de agua">Pozo de agua</option>
                    <option value="Septico">Séptico / Drainfield</option>
                    <option value="Filtro agua">Filtro de agua</option>
                    <option value="Chimenea">Chimenea</option>
                    <option value="Techo">Techo</option>
                    <option value="Electrodomesticos">Electrodomésticos</option>
                    <option value="Detectores">Detectores de humo</option>
                    <option value="General">General</option>
                </select>
                <label for="tarea-frecuencia">Frecuencia</label>
                <select id="tarea-frecuencia" required>
                    <option value="">Seleccionar...</option>
                    <option value="mensual">Mensual</option>
                    <option value="trimestral">Trimestral</option>
                    <option value="semestral">Semestral</option>
                    <option value="anual">Anual</option>
                    <option value="unica">Única vez</option>
                </select>
                <label for="tarea-fecha">Próxima fecha</label>
                <input type="date" id="tarea-fecha" required>
                <label for="tarea-costo">Costo estimado ($)</label>
                <input type="number" id="tarea-costo" step="0.01" value="0">
                <label for="tarea-notas">Notas</label>
                <textarea id="tarea-notas" rows="3"></textarea>
                <button type="submit" class="btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <div id="modal-completar" class="modal">
        <div class="modal-content">
            <span class="cerrar">&times;</span>
            <h3>Completar Tarea</h3>
            <form id="form-completar">
                <input type="hidden" id="completar-id">
                <p id="completar-nombre-tarea"></p>
                <label for="completar-fecha">Fecha realizada</label>
                <input type="date" id="completar-fecha" required>
                <label for="completar-costo">Costo real ($)</label>
                <input type="number" id="completar-costo" step="0.01" required>
                <label for="completar-proveedor">Proveedor (opcional)</label>
                <select id="completar-proveedor">
                    <option value="">Ninguno / Yo mismo</option>
                </select>
                <label for="completar-notas">Notas</label>
                <textarea id="completar-notas" rows="3"></textarea>
                <button type="submit" class="btn-primary">Marcar como completada</button>
            </form>
        </div>
    </div>

    <div id="modal-proveedor" class="modal">
        <div class="modal-content">
            <span class="cerrar">&times;</span>
            <h3 id="modal-proveedor-titulo">Nuevo Proveedor</h3>
            <form id="form-proveedor">
                <input type="hidden" id="proveedor-id">
                <label for="proveedor-nombre">Nombre</label>
                <input type="text" id="proveedor-nombre" required>
                <label for="proveedor-servicio">Servicio</label>
                <select id="proveedor-servicio" required>
                    <option value="">Seleccionar...</option>
                    <option value="HVAC">HVAC</option>
                    <option value="Plomeria">Plomería</option>
                    <option value="Septico">Séptico</option>
                    <option value="Electricidad">Electricidad</option>
                    <option value="Chimenea">Chimenea</option>
                    <option value="Electrodomesticos">Electrodomésticos</option>
                    <option value="General">General</option>
                </select>
                <label for="proveedor-telefono">Teléfono</label>
                <input type="tel" id="proveedor-telefono">
                <label for="proveedor-email">Email</label>
                <input type="email" id="proveedor-email">
                <label for="proveedor-notas">Notas</label>
                <textarea id="proveedor-notas" rows="3"></textarea>
                <button type="submit" class="btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
