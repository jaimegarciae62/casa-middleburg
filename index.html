<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa Middleburg</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2rem;
            color: #4ade80;
            margin-bottom: 5px;
        }
        header p {
            color: #888;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-num {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4ade80;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #888;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .section h2 {
            font-size: 1rem;
            color: #4ade80;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .task.done {
            opacity: 0.5;
        }
        .task input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #4ade80;
        }
        .task-info {
            flex: 1;
        }
        .task-name {
            font-weight: 500;
            margin-bottom: 3px;
        }
        .task-detail {
            font-size: 0.8rem;
            color: #888;
        }
        .task-due {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #4ade80;
            color: #000;
            font-weight: 600;
        }
        .task-due.soon {
            background: #fbbf24;
        }
        .task-due.overdue {
            background: #ef4444;
            color: #fff;
        }
        .add-btn {
            width: 100%;
            padding: 15px;
            border: 2px dashed #333;
            border-radius: 10px;
            background: transparent;
            color: #888;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .add-btn:hover {
            border-color: #4ade80;
            color: #4ade80;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #4ade80;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2d3748;
            color: #fff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
        }
        .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-save {
            background: #4ade80;
            color: #000;
            font-weight: bold;
        }
        .btn-cancel {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Casa Middleburg</h1>
            <p>Mantenimiento inteligente</p>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="pending">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="done">0</div>
                <div class="stat-label">Completadas</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="streak">0</div>
                <div class="stat-label">Racha días</div>
            </div>
        </div>

        <div class="section">
            <h2>🔥 Esta semana</h2>
            <div id="urgent"></div>
        </div>

        <div class="section">
            <h2>📅 Este mes</h2>
            <div id="monthly"></div>
        </div>

        <div class="section">
            <h2>📋 Próximamente</h2>
            <div id="later"></div>
        </div>

        <button class="add-btn" onclick="openModal()">+ Agregar tarea</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Nueva tarea</h3>
            <input type="text" id="taskName" placeholder="Nombre de la tarea">
            <select id="taskCategory">
                <option value="hvac">🌡️ HVAC</option>
                <option value="plumbing">🚿 Plomería</option>
                <option value="exterior">🏡 Exterior</option>
                <option value="interior">🛋️ Interior</option>
                <option value="safety">🔒 Seguridad</option>
                <option value="other">📦 Otro</option>
            </select>
            <input type="date" id="taskDate">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-save" onclick="saveTask()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

        // Tareas predeterminadas para casa de 1 año en Virginia
        const defaultTasks = [
            { id: 1, name: "Cambiar filtro HVAC", category: "hvac", detail: "Filtro 20x25x1", daysInterval: 90, lastDone: null },
            { id: 2, name: "Revisar detectores de humo", category: "safety", detail: "Probar botón de cada uno", daysInterval: 30, lastDone: null },
            { id: 3, name: "Limpiar canaletas", category: "exterior", detail: "Antes de otoño e invierno", daysInterval: 180, lastDone: null },
            { id: 4, name: "Inspeccionar calentador de agua", category: "plumbing", detail: "Revisar válvula y sedimentos", daysInterval: 365, lastDone: null },
            { id: 5, name: "Revisar sellado de ventanas", category: "exterior", detail: "Buscar corrientes de aire", daysInterval: 365, lastDone: null },
            { id: 6, name: "Limpiar refrigerador - serpentines", category: "interior", detail: "Parte trasera", daysInterval: 180, lastDone: null },
            { id: 7, name: "Revisar extintores", category: "safety", detail: "Verificar presión", daysInterval: 365, lastDone: null },
            { id: 8, name: "Tratar deck/patio", category: "exterior", detail: "Sellador para madera", daysInterval: 365, lastDone: null },
            { id: 9, name: "Servicio HVAC profesional", category: "hvac", detail: "Antes de verano", daysInterval: 365, lastDone: null },
            { id: 10, name: "Drenar calentador de agua", category: "plumbing", detail: "Remover sedimentos", daysInterval: 365, lastDone: null },
        ];

        function init() {
            if (tasks.length === 0) {
                tasks = defaultTasks.map(t => ({
                    ...t,
                    dueDate: calculateDueDate(t.daysInterval)
                }));
                saveTasks();
            }
            render();
        }

        function calculateDueDate(days) {
            const date = new Date();
            date.setDate(date.getDate() + Math.floor(Math.random() * days));
            return date.toISOString().split('T')[0];
        }

        function getDaysUntil(dateStr) {
            const today = new Date();
            today.setHours(0,0,0,0);
            const due = new Date(dateStr);
            return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
        }

        function render() {
            const urgent = document.getElementById('urgent');
            const monthly = document.getElementById('monthly');
            const later = document.getElementById('later');

            urgent.innerHTML = '';
            monthly.innerHTML = '';
            later.innerHTML = '';

            let pendingCount = 0;
            let doneCount = 0;

            tasks.forEach(task => {
                if (task.completed) {
                    doneCount++;
                    return;
                }
                pendingCount++;

                const days = getDaysUntil(task.dueDate);
                const html = createTaskHTML(task, days);

                if (days <= 7) {
                    urgent.innerHTML += html;
                } else if (days <= 30) {
                    monthly.innerHTML += html;
                } else {
                    later.innerHTML += html;
                }
            });

            document.getElementById('pending').textContent = pendingCount;
            document.getElementById('done').textContent = doneCount;

            if (!urgent.innerHTML) urgent.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">✅ ¡Todo al día!</p>';
            if (!monthly.innerHTML) monthly.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Nada pendiente</p>';
            if (!later.innerHTML) later.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Nada pendiente</p>';
        }

        function createTaskHTML(task, days) {
            let dueClass = '';
            let dueText = '';

            if (days < 0) {
                dueClass = 'overdue';
                dueText = 'Vencida';
            } else if (days === 0) {
                dueClass = 'overdue';
                dueText = 'Hoy';
            } else if (days <= 7) {
                dueClass = 'soon';
                dueText = days + ' días';
            } else {
                dueText = days + ' días';
            }

            return `
                <div class="task" id="task-${task.id}">
                    <input type="checkbox" onchange="completeTask(${task.id})">
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-detail">${task.detail || ''}</div>
                    </div>
                    <span class="task-due ${dueClass}">${dueText}</span>
                </div>
            `;
        }

        function completeTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = true;
                task.completedDate = new Date().toISOString();
                saveTasks();
                
                setTimeout(() => {
                    render();
                }, 300);
            }
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('taskDate').valueAsDate = new Date();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveTask() {
            const name = document.getElementById('taskName').value.trim();
            const category = document.getElementById('taskCategory').value;
            const date = document.getElementById('taskDate').value;

            if (!name || !date) {
                alert('Completa todos los campos');
                return;
            }

            tasks.push({
                id: Date.now(),
                name: name,
                category: category,
                detail: '',
                dueDate: date,
                completed: false
            });

            saveTasks();
            closeModal();
            render();

            document.getElementById('taskName').value = '';
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        init();
    </script>
</body>
</html>
